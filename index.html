<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>ChargeByte - EV Charging & Power Bank Rental Management Platform</title>
    <meta name="title" content="ChargeByte - EV Charging & Power Bank Rental Management Platform" />
    <meta
      name="description"
      content="ChargeByte provides comprehensive management solutions for EV charging stations and power bank rental networks. Monitor, manage, and grow your charging infrastructure with real-time analytics."
    />
    <meta
      name="keywords"
      content="EV charging, power bank rental, charging station management, electric vehicle infrastructure, battery rental, charge point management, Kenya EV, sustainable energy"
    />
    <meta name="author" content="ChargeByte" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chargebyte.io/" />
    <meta
      property="og:title"
      content="ChargeByte - EV Charging & Power Bank Rental Management Platform"
    />
    <meta
      property="og:description"
      content="Comprehensive management solutions for EV charging stations and power bank rental networks. Real-time monitoring, analytics, and control."
    />
    <meta property="og:image" content="/images/chargebyte-og-image.png" />
    <meta property="og:image:alt" content="ChargeByte Platform Dashboard" />
    <meta property="og:site_name" content="ChargeByte" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://chargebyte.io/" />
    <meta
      property="twitter:title"
      content="ChargeByte - EV Charging & Power Bank Rental Management Platform"
    />
    <meta
      property="twitter:description"
      content="Manage your EV charging infrastructure and power bank rentals with ChargeByte's comprehensive platform."
    />
    <meta property="twitter:image" content="/images/chargebyte-og-image.png" />
    <meta property="twitter:image:alt" content="ChargeByte Platform Dashboard" />
    <meta property="twitter:site" content="@ChargeByte" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://chargebyte.io/" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ChargeByte",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "Comprehensive management platform for EV charging stations and power bank rental networks",
        "url": "https://chargebyte.io",
        "provider": {
          "@type": "Organization",
          "name": "ChargeByte",
          "url": "https://chargebyte.io",
          "logo": "https://chargebyte.io/images/logo.png"
        },
        "featureList": "Real-time monitoring, Revenue analytics, Station management, User management, Payment processing",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "KES"
        }
      }
    </script>

    <!-- Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ChargeByte",
        "url": "https://chargebyte.io",
        "logo": "https://chargebyte.io/images/logo.png",
        "sameAs": [
          "https://twitter.com/ChargeByte",
          "https://linkedin.com/company/chargebyte",
          "https://facebook.com/chargebyte"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+254-XXX-XXXXXX",
          "contactType": "customer service",
          "availableLanguage": ["English", "Swahili"]
        }
      }
    </script>

    <!-- WebSite Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ChargeByte",
        "url": "https://chargebyte.io",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://chargebyte.io/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- Additional SEO -->
    <meta name="geo.region" content="KE" />
    <meta name="geo.placename" content="Nairobi" />
    <meta name="geo.position" content="-1.286389;36.817223" />
    <meta name="ICBM" content="-1.286389, 36.817223" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
